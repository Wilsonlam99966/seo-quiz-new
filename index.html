const ALL_QUESTIONS=[
{id:1,cat:"On-Page SEO",diff:"Beginner",
context:"📝 You're optimising a 1,500-word listicle for a SaaS review site targeting the keyword 'best project management tools'.",
question:"Which title tag is MOST optimised for both rankings and click-through rate?",
options:["Best Project Management Tools | Your Site Name","Top 10 Best Project Management Tools for Teams in 2024","Project Management Software Review & Comparison Guide","Tools for Managing Projects — A Complete Overview"],
correct:1,
explanation:"Option B front-loads the exact-match keyword, includes a power number ('Top 10') that lifts CTR by signalling a list, adds a year for freshness, and stays within the ~60-character SERP display limit. Option A is clean but lacks intent-matching modifiers. C and D dilute keyword relevance and miss the list-based search intent entirely."},

{id:2,cat:"On-Page SEO",diff:"Intermediate",
context:"🔍 GSC shows your page ranks #4 for 'CRM software for small business' with 12,000 impressions/month, but CTR is only 2.1% against a 5% category benchmark.",
question:"What is your FIRST and highest-leverage action to increase clicks without rebuilding the page?",
options:["Add more internal links pointing to the page to strengthen its authority signal","Rewrite the meta description with a clear value proposition and a call-to-action","Increase the word count from 800 to 2,000 words for better topical coverage","Add FAQ schema markup to expand the SERP snippet footprint"],
correct:1,
explanation:"A poor CTR at position #4 is primarily a meta-description problem. A compelling rewrite with a benefit statement and CTA directly influences user click behaviour at zero development cost. FAQ schema (D) is valid but secondary — fix the copy first. Internal links improve authority, not CTR. Word count affects rankings, not direct CTR from a stable position."},

{id:3,cat:"On-Page SEO",diff:"Intermediate",
context:"⚠️ Two of your pages compete for 'email marketing best practices': a blog post at position 8 and a guide at position 11. Both have unique angles but nearly identical search intent.",
question:"What is the correct strategy for resolving this content cannibalization?",
options:["Delete the lower-ranking page immediately and 301 redirect it to the stronger one","Add a noindex tag to the lower-ranking page to consolidate crawl budget","Audit both pages, merge the best content into one URL, then 301 redirect the other","Retarget one page to a closely related keyword so they no longer compete"],
correct:2,
explanation:"Content consolidation (merge + 301) is the gold standard. Deleting (A) risks destroying unique backlinks and content. A noindex (B) removes the page from search but wastes the content asset. Retargeting (D) only works if the pages genuinely serve different intents — when intent is the same, consolidation is required. Merging combines link equity, engagement signals, and depth into one authoritative page."},

{id:4,cat:"On-Page SEO",diff:"Beginner",
context:"🖼️ An e-commerce product page for 'red leather running shoes' has its hero image alt text set to 'shoe123.jpg' — the raw filename.",
question:"Which replacement alt text follows SEO and accessibility best practices?",
options:["image","red leather running shoes product photo","buy red leather running shoes online cheap free shipping","shoes"],
correct:1,
explanation:"Good alt text accurately describes the image, includes the primary keyword naturally, and supports screen-reader accessibility. Option B does all three. Option C is keyword-stuffed with commercial intent phrases Google treats as manipulative. Options A and D are too vague to provide meaningful context for crawlers or visually impaired users."},

{id:5,cat:"On-Page SEO",diff:"Advanced",
context:"❓ A home improvement site wants its DIY articles to appear in Google's 'People Also Ask' boxes for the query 'how to fix a leaky faucet'.",
question:"Which content signal does Google MOST rely on to determine PAA box eligibility?",
options:["H2 headers that exactly match the PAA question word-for-word","A self-contained 40–60 word paragraph that directly answers the question near the top of the content","A minimum of 5 outbound links to authoritative plumbing resources","Content refreshed or republished within the last 30 days"],
correct:1,
explanation:"Google extracts PAA answers from concise, self-contained paragraphs (typically 40–60 words) that directly answer the question without requiring surrounding context. Exact-match H2s are not required — semantic clarity matters more. Freshness and outbound links are not confirmed PAA eligibility factors."},

{id:6,cat:"On-Page SEO",diff:"Intermediate",
context:"📊 Your page ranks #12 for 'marketing automation software'. Top-5 competitors all use 'best marketing automation tools' in their H1 and title, while yours says 'software'. 'Tools' has 2× the search volume.",
question:"What does this discrepancy indicate and what is the correct fix?",
options:["The H1 mismatch is causing a manual penalty — change it immediately before further drops","There is a keyword intent and topical alignment gap — update H1, title tag, and on-page language to match what users search for","H1 tags have no direct ranking impact — invest the time in building more backlinks instead","The competitors are keyword stuffing — avoid copying their practice"],
correct:1,
explanation:"This is a topical alignment issue, not a penalty. 'Tools' signals a listicle/comparison intent while 'software' implies a product page — intent determines which pages Google rewards. Matching SERP language in H1 and title strengthens relevance signals holistically. H1 does influence rankings as a semantic signal, though it's not the sole factor."},

{id:7,cat:"On-Page SEO",diff:"Advanced",
context:"🔗 Your site has a pillar page 'Complete Guide to Email Marketing' (40 referring domains) and 8 cluster content pages on subtopics like subject lines, segmentation, and A/B testing.",
question:"Which internal linking architecture BEST distributes authority and signals topical depth to Google?",
options:["Hub-and-spoke: cluster pages link to the pillar AND the pillar links back to all clusters (bidirectional)","Linear chain: cluster pages link to each other sequentially in a content series","Flat mesh: every page links to every other page to maximise crawl interconnectivity","One-way waterfall: the pillar links out to clusters, but clusters do not link back"],
correct:0,
explanation:"Hub-and-spoke (topic cluster) architecture is the gold standard. Bidirectional linking passes PageRank between pillar and clusters, reinforces content hierarchy, and signals comprehensive topic coverage. Linear chains don't pass authority back to the pillar. Flat meshes dilute link equity. One-way linking misses the feedback loop from clusters back to the pillar page."},

{id:8,cat:"Technical SEO",diff:"Beginner",
context:"🕸️ A site audit finds 300 pages returning a 200 HTTP status but displaying 'No results found' in the body — typically empty faceted filter URLs like /shop?color=red&size=XS.",
question:"What is this issue called and what is the correct technical fix?",
options:["Crawl trap — add a robots.txt Disallow rule to block all filter URL patterns","Soft 404 — return a proper 404/410 HTTP status or add a noindex meta tag to these pages","Thin content — add 300+ words of boilerplate text to fill each empty page","Duplicate content — add a canonical tag on each pointing to the main category page"],
correct:1,
explanation:"These are 'Soft 404s' — pages returning 200 OK but serving no useful content. The correct fix is a proper 404/410 HTTP status or a noindex tag. Soft 404s waste crawl budget, confuse Googlebot, and dilute index quality. Adding filler text (C) is a cosmetic workaround. Canonicals (D) help with duplicates but don't fix the fundamental signal that these pages should not exist in the index."},

{id:9,cat:"Technical SEO",diff:"Intermediate",
context:"🔒 A site completed an HTTP → HTTPS migration. The SSL certificate is valid and confirmed. Despite this, organic traffic drops 35% over 3 weeks. The dev team insists everything was migrated.",
question:"What is the MOST likely cause of the sustained traffic drop?",
options:["Google penalised the site algorithmically for changing the URL structure to HTTPS","Mixed content errors — hard-coded HTTP asset URLs on HTTPS pages are breaking page experience signals","The XML sitemap was not updated to HTTPS URLs, preventing Googlebot from re-indexing pages","301 redirect chains from HTTP to HTTPS are too long, causing crawl budget waste"],
correct:1,
explanation:"Mixed content is the most common cause of post-migration traffic loss. HTTP images and scripts on HTTPS pages trigger browser security warnings, hurt Core Web Vitals, and cause Googlebot to treat pages as insecure. An outdated sitemap slows re-crawl but can't explain a 35% drop. Redirect chains can cause issues but are far less impactful than mixed content at scale."},

{id:10,cat:"Technical SEO",diff:"Advanced",
context:"⚙️ A React SPA loads all product data via API calls after the initial HTML shell renders. GSC shows dozens of key product pages as 'Crawled – currently not indexed'.",
question:"Which implementation gives Google the BEST ability to index the dynamic content?",
options:["Submit a comprehensive XML sitemap with all product URLs and ping GSC to trigger recrawling","Implement Server-Side Rendering (SSR) or Static Site Generation (SSG) for all critical product pages","Use dynamic rendering: serve fully pre-rendered HTML to Googlebot while users receive client-side rendering","Add link rel=preload hints for all JavaScript bundles to speed up their parsing"],
correct:1,
explanation:"SSR/SSG is the gold standard — Googlebot receives fully rendered HTML on the first request with no JavaScript execution delay. Dynamic rendering (C) is a valid Google-endorsed workaround but is a stepping stone, not best practice. Sitemaps (A) improve discovery but don't solve the rendering problem. Preload hints (D) improve speed but don't fix indexability of JavaScript-dependent content."},

{id:11,cat:"Technical SEO",diff:"Advanced",
context:"📊 PageSpeed Insights flags a lead-gen page with LCP of 4.2s and INP of 380ms. Third-party chat widgets, ad pixels, and analytics scripts are blocking the main thread.",
question:"Which Core Web Vitals metric is MOST directly impacted by third-party scripts blocking the main thread?",
options:["LCP (Largest Contentful Paint) — third-party scripts delay the server's initial response time","INP (Interaction to Next Paint) — third-party scripts occupy the main thread, slowing the browser's response to all user interactions","CLS (Cumulative Layout Shift) — ad scripts inject elements after load that shift the visible layout","FID (First Input Delay) — scripts delay how quickly the browser registers the very first click"],
correct:1,
explanation:"INP replaced FID as a Core Web Vital in March 2024. It measures interaction responsiveness throughout the entire page lifecycle. Third-party scripts are the #1 cause of poor INP because they continuously occupy the main thread. LCP can also be affected by render-blocking scripts, but main thread occupation maps most directly to the interaction responsiveness INP measures."},

{id:12,cat:"Technical SEO",diff:"Advanced",
context:"🌍 An international e-commerce site sells in the UK, Australia, and Canada — all in English. It uses /uk/, /au/, and /ca/ subdirectories and sees duplicate content warnings in GSC.",
question:"What is the CORRECT hreflang implementation for this setup?",
options:["Hreflang is only needed for different languages — same-language regional variants don't require it","Implement hreflang with en-GB, en-AU, en-CA tags, and an x-default tag pointing to the global fallback page","Add canonical tags from /au/ and /ca/ pointing to /uk/ as the authoritative master version","Set hreflang='en' on all pages — Google will auto-detect regional targeting from content signals"],
correct:1,
explanation:"Hreflang IS required for same-language, different-region targeting. It tells Google precisely which version to serve users in each country, resolving duplicate content issues. The x-default tag is required as a fallback for unlisted regions. Canonicaling /au/ and /ca/ to /uk/ (C) would destroy international targeting. Setting only hreflang='en' without a region code (D) doesn't help Google distinguish between regional variants."},

{id:13,cat:"Technical SEO",diff:"Intermediate",
context:"🕷️ A 500,000-URL e-commerce site has important product pages showing as 'Discovered – currently not indexed' in GSC. Crawl stats show 40% of Googlebot's budget consumed by faceted filter URLs.",
question:"What is the BEST action to recover crawl budget for important product pages?",
options:["Submit all 500,000 URLs in an XML sitemap to compel Google to crawl and index all of them","Block faceted navigation parameters in robots.txt or configure them using GSC URL Parameter Handling","Improve server TTFB so Googlebot can process pages more quickly per visit","Add self-referencing rel=canonical tags to every product page"],
correct:1,
explanation:"Crawl budget is being consumed by parameter-generated duplicates. Blocking faceted URLs frees up Googlebot's attention for important product pages. A large sitemap (A) doesn't fix budget waste — Google still discovers and crawls all found URLs. Self-referencing canonicals (D) help signal preferred URLs but don't prevent Googlebot from visiting junk URLs first. TTFB improvements (C) help overall health but don't redirect crawl attention."},

{id:14,cat:"Technical SEO",diff:"Intermediate",
context:"🗺️ Your sitemap.xml contains 800 URLs returning 301 redirects, 200 returning 404 errors, 1,500 noindexed pages, and 400 URLs blocked by robots.txt — out of 12,000 total submitted URLs.",
question:"What should you fix FIRST to restore sitemap quality?",
options:["Split the sitemap into multiple smaller files since 12,000 URLs approaches Google's per-file limit","Remove all non-200-status, noindexed, and robots-blocked URLs so the sitemap only contains canonical indexable pages","Compress the sitemap using gzip to improve Googlebot's parsing efficiency","Add lastmod timestamps to all URLs to signal content freshness and recrawl priority"],
correct:1,
explanation:"A sitemap should only contain canonical, indexable, 200-OK URLs. Including redirects, 404s, noindexed pages, and blocked URLs sends conflicting signals and erodes the sitemap's reliability as a crawl guide. Google's limit is 50,000 URLs per file — so size isn't the issue here. Gzip (C) and lastmod dates (D) are valid but secondary to fixing foundational URL quality first."},

{id:15,cat:"Off-Page SEO",diff:"Beginner",
context:"🔗 A competitor has 500 total backlinks from 120 unique referring domains. Your site has 600 total backlinks from only 40 unique referring domains. Both sites are in the same niche.",
question:"Who has the stronger link profile and why?",
options:["You do — you have 100 more total backlinks and PageRank accumulates with every individual link","Your competitor — they have 3× more unique referring domains, signalling broader independent editorial trust","It's equal — total link volume and domain diversity balance each other out","You do — Google counts each backlink individually for its PageRank calculation"],
correct:1,
explanation:"Referring domain count is far more important than total backlinks. 120 independent sites endorsing a domain signals broad, organic trust. Multiple links from the same domain yield steeply diminishing returns. Your competitor's profile is substantially stronger — their backlinks come from 3× as many independent sources, which is the primary quality signal Google weighs."},

{id:16,cat:"Off-Page SEO",diff:"Intermediate",
context:"⚠️ GSC shows a manual action: 'Unnatural links pointing to your site.' Organic traffic has dropped 60% in the two weeks since it appeared.",
question:"What is the CORRECT sequence of actions to recover from this penalty?",
options:["Immediately upload a disavow file to GSC and submit a reconsideration request","Audit all backlinks → contact webmasters to remove spammy links → disavow remaining toxic links → submit a reconsideration request with documented evidence","Migrate the site to a new domain to cleanly escape the manual penalty","Build high-quality links to dilute the toxic ones, then submit a reconsideration request"],
correct:1,
explanation:"Google's guidelines require a good-faith effort to manually remove links before relying on the disavow tool. The correct sequence: (1) export all backlinks, (2) categorise toxic links, (3) email webmasters with documented outreach, (4) disavow remaining toxic links in domain: format, (5) submit a detailed reconsideration request with all evidence. Skipping the removal attempt is the most common reason reconsideration requests are rejected."},

{id:17,cat:"Off-Page SEO",diff:"Advanced",
context:"💸 A fintech startup has a $5,000/month link-building budget. The team is debating mass guest posting, digital PR with original research, and paid niche edits.",
question:"Which strategy offers the BEST risk-adjusted ROI in the current search landscape?",
options:["Mass guest posting on DA30+ blogs with keyword-rich anchor text across multiple domains","Digital PR — creating original data studies and pitching them to journalists for editorial coverage","Paid niche edits — inserting links into existing high-traffic, aged articles via vendor networks","Skyscraper technique — creating better content than top-ranking pages and conducting link outreach"],
correct:1,
explanation:"Digital PR with original data earns editorial links — the highest-quality type — from authoritative news sites. It's fully white-hat and builds brand signals simultaneously. Mass guest posting (A) at scale violates Google's link scheme guidelines. Paid niche edits (C) carry paid-link risk. Skyscraper (D) is a content strategy that still requires its own outreach effort to acquire links."},

{id:18,cat:"Off-Page SEO",diff:"Intermediate",
context:"🧪 You audit a site's backlink anchor text: 65% exact-match keyword anchors ('best savings account'), 15% branded, 10% naked URL, 10% generic ('click here', 'read more').",
question:"What does this anchor text distribution indicate, and what action should you take?",
options:["The profile is healthy — high keyword anchor ratios prove strong topical relevance to Google","This is a heavily over-optimised, unnatural profile that signals link manipulation and risks an algorithmic penalty — diversify immediately","The generic anchors are the problem — replacing them with keyword anchors would improve relevance signals","Anchor text distribution only matters during a manual review, not for algorithmic ranking assessments"],
correct:1,
explanation:"A natural backlink profile has only 2–5% exact-match keyword anchors. At 65%, this is a textbook red flag for link manipulation. A healthy distribution skews toward branded (40–50%), naked URL (20–30%), and generic (10–20%) anchors. This pattern was specifically targeted by Google's Penguin algorithm. Immediate diversification through new high-quality links and selective disavowal is needed."},

{id:19,cat:"Off-Page SEO",diff:"Advanced",
context:"🏥 A health and wellness site publishing nutrition and supplement articles has seen declining rankings since a broad core algorithm update — despite having a strong backlink profile.",
question:"Which improvement would MOST directly address E-E-A-T signals for this YMYL site?",
options:["Increase all health articles to 3,000+ words to demonstrate comprehensive topic coverage","Add credentialed author bylines (RD, MD), link to detailed author bio pages, and document a formal medical review process with reviewer credentials","Build additional backlinks from .edu and .gov domains to boost overall domain authority","Add publication and last-updated dates to every article to signal content freshness"],
correct:1,
explanation:"E-E-A-T for YMYL health content is most directly tied to demonstrated author expertise and editorial trustworthiness. Google's Quality Rater Guidelines explicitly require evidence of expert authorship for health content. Author credentials, bio pages, and a transparent medical review process are the highest-signal improvements available. .edu/.gov links help domain authority but don't fix on-page E-E-A-T."},

{id:20,cat:"Off-Page SEO",diff:"Intermediate",
context:"💡 A brand monitoring tool shows that TechCrunch has mentioned your SaaS product 'DataSync' three times in recent articles — but has never hyperlinked to your website.",
question:"What is the BEST approach to capitalise on these unlinked brand mentions?",
options:["Wait — unlinked brand mentions pass implied link co-citation value without a hyperlink","Send a polite, personalised outreach email to the journalist pointing out the mention and requesting a link attribution","Build reciprocal links to TechCrunch articles to incentivise them to link back as a courtesy","Submit a copyright or attribution complaint to TechCrunch's editorial team to compel them to add a link"],
correct:1,
explanation:"Unlinked brand mention reclamation is one of the highest-ROI link tactics available. The journalist already knows and wrote about your product positively — success rates are far higher than cold outreach (typically 15–30% with major publications). A courteous email requesting attribution is standard professional practice. Implied links (A) are theorised but not confirmed to pass ranking signals. Reciprocal links (C) violate Google's link scheme guidelines."}

ex-wrap:wrap;margin-top:28px}.review-nav{display:flex;align-items:center;gap:8px;margin-bottom:24px;flex-wrap:wrap}.filter-btn{padding:7px 16px;border-radius:99px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-sub);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .18s}.filter-btn.active{background:var(--accent-light);border-color:var(--accent-border);color:var(--accent)}.review-cards{display:flex;flex-direction:column;gap:16px}.review-card{background:var(--surface);border-radius:18px;padding:24px 26px;box-shadow:0 2px 12px rgba(0,0,0,.05)}.review-card.ok{border:1.5px solid var(--success-border)}.review-card.fail{border:1.5px solid var(--error-border)}.review-card-header{display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:14px}.review-q{font-size:15px;font-family:'Lora',Georgia,serif;font-weight:600;line-height:1.6;margin-bottom:8px}.review-context{font-size:13px;color:var(--text-muted);margin-bottom:16px;line-height:1.65}.answer-box{border-radius:10px;padding:11px 15px;margin-bottom:8px;font-size:14px;border:1.5px solid}.answer-box.user-wrong{background:var(--error-bg);border-color:var(--error-border);color:var(--error-text)}.answer-box.correct-ans{background:var(--success-bg);border-color:var(--success-border);color:var(--success-text);margin-bottom:14px}.review-explanation{background:var(--surface-alt);border:1px solid var(--border);border-radius:10px;padding:14px 16px;font-size:14px;color:var(--text-sub);line-height:1.8}@media(max-width:500px){.intro-cats,.levels-grid{grid-template-columns:1fr}.card{padding:20px}}</style></head>

<script>

const LEVELS=[{min:0,max:.25,label:"SEO Learner",emoji:"🌱",desc:"You're building your foundation. Focus on on-page fundamentals, crawlability basics, and keyword research principles."},{min:.26,max:.5,label:"SEO Practitioner",emoji:"📈",desc:"Solid core knowledge. Deepen your technical skills and link analysis to level up."},{min:.51,max:.75,label:"SEO Strategist",emoji:"🎯",desc:"Strong across all three pillars. You can lead audits and drive measurable results independently."},{min:.76,max:1,label:"SEO Expert",emoji:"🏆",desc:"Elite-level understanding. You think in systems, anticipate algorithm behaviour, and can architect full SEO programmes."}];

function rq(){const q=QUESTIONS[st.qIdx];document.getElementById('navLabel').textContent='Q'+(st.qIdx+1)+'/'+QUESTIONS.length;document.getElementById('navFill').style.width=(((st.qIdx+1)/QUESTIONS.length)*100)+'%';document.getElementById('dotTrail').innerHTML=QUESTIONS.map((qq,i)=>{const done=st.answers[qq.id]!==undefined;const ok=st.answers[qq.id]===qq.correct;let c='';if(i===st.qIdx)c='current';else if(done&&ok)c='correct';else if(done)c='wrong';return'<div class="dot '+c+'"></div>'}).join('');document.getElementById('qBadges').innerHTML=mb(CE[q.cat]+' '+q.cat,CB[q.cat])+' '+mb(q.diff,DB[q.diff])+'<span class="q-num">Question '+(st.qIdx+1)+' of '+QUESTIONS.length+'</span>';document.getElementById('qScenario').textContent=q.context;document.getElementById('qText').textContent=q.question;document.getElementById('optionsList').innerHTML=q.options.map((opt,i)=>'<button class="option" id="opt-'+i+'" onclick="so('+i+')"><span class="opt-letter" id="ol-'+i+'">'+String.fromCharCode(65+i)+'</span><span>'+opt+'</span></button>').join('');document.getElementById('explanation').className='explanation';document.getElementById('explanation').style.display='none';const sb=document.getElementById('submitBtn');sb.style.display='inline-flex';sb.textContent='Select an option above';sb.disabled=true;document.getElementById('nextBtn').style.display='none';st.selected=null;st.revealed=false}

function submitAnswer(){if(st.selected===null)return;const q=QUESTIONS[st.qIdx];st.answers[q.id]=st.selected;st.revealed=true;const ok=st.selected===q.correct;document.querySelectorAll('.option').forEach((el,i)=>{el.classList.remove('selected');if(i===q.correct){el.classList.add('revealed-correct');document.getElementById('ol-'+i).textContent='✓';document.getElementById('ol-'+i).style.background='#16A34A';document.getElementById('ol-'+i).style.color='#fff';document.getElementById('ol-'+i).style.border='none'}else if(i===st.selected){el.classList.add('revealed-wrong');document.getElementById('ol-'+i).textContent='✗';document.getElementById('ol-'+i).style.background='#DC2626';document.getElementById('ol-'+i).style.color='#fff';document.getElementById('ol-'+i).style.border='none'}else el.classList.add('revealed-neutral')});const ex=document.getElementById('explanation');ex.style.display='block';ex.className='explanation visible '+(ok?'correct-exp':'wrong-exp');document.getElementById('expIcon').textContent=ok?'✅':'❌';document.getElementById('expLabel').textContent=ok?'Correct!':'Not quite — here\'s the full explanation:';document.getElementById('expLabel').style.color=ok?'var(--success-text)':'var(--error-text)';document.getElementById('expText').textContent=q.explanation;document.getElementById('submitBtn').style.display='none';const nb=document.getElementById('nextBtn');nb.style.display='inline-flex';nb.textContent=st.qIdx<QUESTIONS.length-1?'Next Question →':'See My Results →';document.getElementById('dotTrail').innerHTML=QUESTIONS.map((qq,i)=>{const done=st.answers[qq.id]!==undefined;const ok=st.answers[qq.id]===qq.correct;let c='';if(i===st.qIdx)c='current';else if(done&&ok)c='correct';else if(done)c='wrong';return'<div class="dot '+c+'"></div>'}).join('')}
function nextQuestion(){if(st.qIdx<QUESTIONS.length-1){st.qIdx++;rq();document.getElementById('questionCard').scrollIntoView({behavior:'smooth',block:'start'})}else showResultsScreen()}
function showResultsScreen(){const s=gs();const l=gl(s);document.getElementById('scoreNum').textContent=s;document.getElementById('scoreDenom').textContent='/'+QUESTIONS.length;document.getElementById('scoreEmoji').textContent=l.emoji;document.getElementById('scoreLevelBadge').textContent=l.label;document.getElementById('scoreDesc').textContent=l.desc;const cats=['On-Page SEO','Technical SEO','Off-Page SEO'];document.getElementById('catBreakdown').innerHTML=cats.map(cat=>{const qs=QUESTIONS.filter(q=>q.cat===cat);if(!qs.length)return'';const correct=qs.filter(q=>st.answers[q.id]===q.correct).length;const pct=Math.round((correct/qs.length)*100);const color=BC(pct);const label=pct===100?'🏆 Perfect!':pct>=67?'Strong':pct>=34?'Developing':'Needs focus';return'<div class="cat-stat"><div class="cat-stat-row"><div style="display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700">'+CE[cat]+' '+cat+'</div><div style="display:flex;align-items:center;gap:10px"><span style="font-size:13px;font-weight:700;color:'+color+'">'+pct+'%</span><span style="font-size:13px;color:var(--text-muted)">'+correct+'/'+qs.length+'</span></div></div><div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%;background:'+color+'"></div></div><div style="font-size:12px;color:var(--text-muted)">'+label+'</div></div>'}).join('');document.getElementById('dotGrid').innerHTML=QUESTIONS.map((q,i)=>{const ok=st.answers[q.id]===q.correct;return'<div class="dot-cell '+(ok?'ok':'fail')+'">'+(ok?'✓':'✗')+'</div>'}).join('');ss('results')}
function showReview(){renderReview();ss('review')}
function renderReview(){const s=gs();const filter=st.filterCat;const qs=filter==='All'?QUESTIONS:QUESTIONS.filter(q=>q.cat===filter);document.getElementById('miniBarLabel').textContent=s+'/'+QUESTIONS.length+' correct';document.getElementById('miniBarFill').style.width=((s/QUESTIONS.length)*100)+'%';document.getElementById('miniBarCat').textContent=filter==='All'?'All categories':filter;document.getElementById('reviewCards').innerHTML=qs.map(q=>{const qNum=QUESTIONS.indexOf(q)+1;const ua=st.answers[q.id];const ok=ua===q.correct;const wr=(ua!==undefined&&!ok)?'<div class="answer-box user-wrong"><strong>Your answer:</strong> '+q.options[ua]+'</div>':'';return'<div class="review-card '+(ok?'ok':'fail')+'"><div class="review-card-header"><div style="display:flex;gap:8px;flex-wrap:wrap">'+mb(CE[q.cat]+' '+q.cat,CB[q.cat])+mb(q.diff,DB[q.diff])+'</div><span style="font-size:13px;font-weight:700;color:'+(ok?'var(--success-text)':'var(--error-text)')+'>'+(ok?'✅ Correct':'❌ Incorrect')+'</span></div><p class="review-q">Q'+qNum+'. '+q.question+'</p><p class="review-context">'+q.context+'</p>'+wr+'<div class="answer-box correct-ans"><strong>Correct answer:</strong> '+q.options[q.correct]+'</div><div class="review-explanation">💡 '+q.explanation+'</div></div>'}).join('')}

function App(){
  const[questions,setQuestions]=useState(null);
  const[view,setView]=useState("list");
  const[editingQ,setEditingQ]=useState(null);
  const[deleteId,setDeleteId]=useState(null);
  const[filterCat,setFilterCat]=useState("All");
  const[toast,setToast]=useState(null);
  const[expandedId,setExpandedId]=useState(null);

  useEffect(()=>{
    (async()=>{
      try{
        const res=await window.storage.get(STORAGE_KEY);
        const loaded=res?JSON.parse(res.value):null;
        setQuestions((loaded&&loaded.length>=20)?loaded:ALL_QUESTIONS);
      }catch{setQuestions(ALL_QUESTIONS);}
    })();
  },[]);

  const persist=useCallback(async(qs)=>{
    try{await window.storage.set(STORAGE_KEY,JSON.stringify(qs));}catch{}
  },[]);

  const showToast=(msg)=>{setToast(msg);setTimeout(()=>setToast(null),2500);};

  const saveQ=async(q)=>{
    let updated;
    if(editingQ&&questions.find(x=>x.id===q.id)){
      updated=questions.map(x=>x.id===q.id?q:x);
      showToast("Question updated ✓");
    }else{
      updated=[...questions,{...q,id:Date.now()}];
      showToast("Question added ✓");
    }
    setQuestions(updated);
    await persist(updated);
    setEditingQ(null);
    setView("list");
  };

  const deleteQ=async(id)=>{
    const updated=questions.filter(q=>q.id!==id);
    setQuestions(updated);
    await persist(updated);
    setDeleteId(null);
    showToast("Question deleted");
  };

  const exportHTML=()=>{
    const html=buildExportHTML(questions);
    const blob=new Blob([html],{type:"text/html"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="seo-quiz.html";
    a.click();
    showToast("seo-quiz.html downloaded!");
  };

  const resetAll=async()=>{
    setQuestions(ALL_QUESTIONS);
    await persist(ALL_QUESTIONS);
    showToast("Reset to all 20 default questions");
  };

  if(!questions)return React.createElement("div",{style:{padding:32,color:"var(--color-text-secondary)",fontSize:14}},"Loading questions...");

  const filtered=filterCat==="All"?questions:questions.filter(q=>q.cat===filterCat);
  const catCounts=CATS.reduce((a,c)=>{a[c]=questions.filter(q=>q.cat===c).length;return a},{});
  const ib={background:"none",border:"none",cursor:"pointer",padding:"4px 8px",borderRadius:6,fontSize:13,fontFamily:"var(--font-sans)",color:"var(--color-text-secondary)"};

  return React.createElement("div",{style:{padding:"16px 0 40px"}},

    toast&&React.createElement("div",{style:{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:"#1C1A17",color:"#fff",padding:"10px 20px",borderRadius:10,fontSize:13,fontWeight:500,zIndex:999,whiteSpace:"nowrap",boxShadow:"0 4px 16px rgba(0,0,0,0.2)"}},toast),

    React.createElement("div",{style:{display:"flex",alignItems:"flex-start",justifyContent:"space-between",flexWrap:"wrap",gap:12,marginBottom:20}},
      React.createElement("div",null,
        React.createElement("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:4}},
          React.createElement("div",{style:{width:30,height:30,background:"#C95E2B",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}},"🔍"),
          React.createElement("span",{style:{fontSize:17,fontWeight:500}},"SEO Quiz Admin Panel"),
        ),
        React.createElement("p",{style:{fontSize:13,color:"var(--color-text-secondary)",marginLeft:40}},`${questions.length} questions loaded · Changes auto-saved`),
      ),
      React.createElement("div",{style:{display:"flex",gap:8,flexWrap:"wrap"}},
        React.createElement("button",{onClick:resetAll,style:{...ib,border:"0.5px solid var(--color-border-secondary)",padding:"7px 14px"}},"↩ Reset to defaults"),
        React.createElement("button",{onClick:exportHTML,style:{background:"#C95E2B",color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",fontSize:13,fontWeight:500,cursor:"pointer",fontFamily:"var(--font-sans)"}},"⬇ Export HTML"),
      )
    ),

    React.createElement("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10,marginBottom:20}},
      [["Total",questions.length,"var(--color-background-secondary)"],
       ["On-Page",catCounts["On-Page SEO"]||0,"#F0FDFA"],
       ["Technical",catCounts["Technical SEO"]||0,"#EFF6FF"],
       ["Off-Page",catCounts["Off-Page SEO"]||0,"#F5F3FF"]
      ].map(([label,count,bg])=>
        React.createElement("div",{key:label,style:{background:bg,borderRadius:10,padding:"12px 14px",border:"0.5px solid var(--color-border-tertiary)"}},
          React.createElement("div",{style:{fontSize:11,color:"var(--color-text-secondary)",marginBottom:4}},label),
          React.createElement("div",{style:{fontSize:22,fontWeight:500}},count)
        )
      )
    ),

    view==="list"&&React.createElement("div",null,
      React.createElement("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}},
        React.createElement("div",{style:{display:"flex",gap:6,flexWrap:"wrap"}},
          ["All",...CATS].map(f=>
            React.createElement("button",{key:f,onClick:()=>setFilterCat(f),style:{padding:"6px 14px",borderRadius:99,border:`1.5px solid ${filterCat===f?"#F0BFA0":"var(--color-border-tertiary)"}`,background:filterCat===f?"#FDF1EC":"transparent",color:filterCat===f?"#C95E2B":"var(--color-text-secondary)",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"var(--font-sans)"}},f==="All"?`All (${questions.length})`:f.replace(" SEO",`(${catCounts[f]||0})`))
          )
        ),
        React.createElement("button",{onClick:()=>{setEditingQ(EMPTY());setView("form");},style:{background:"#C95E2B",color:"#fff",border:"none",borderRadius:8,padding:"9px 18px",fontSize:13,fontWeight:500,cursor:"pointer",fontFamily:"var(--font-sans)"}},"+ Add Question")
      ),

      React.createElement("div",{style:{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:12,overflow:"hidden"}},
        React.createElement("div",{style:{display:"grid",gridTemplateColumns:"32px 1fr 90px 80px",gap:"0 10px",padding:"8px 14px",borderBottom:"0.5px solid var(--color-border-tertiary)",background:"var(--color-background-secondary)"}},
          ["#","Question","Category","Actions"].map(h=>React.createElement("span",{key:h,style:{fontSize:11,fontWeight:500,color:"var(--color-text-secondary)"}},h))
        ),
        filtered.length===0
          ?React.createElement("div",{style:{textAlign:"center",padding:"40px 0",color:"var(--color-text-secondary)",fontSize:14}},"No questions in this category.")
          :filtered.map((q,i)=>{
            const globalNum=questions.indexOf(q)+1;
            const isOpen=expandedId===q.id;
            return React.createElement("div",{key:q.id,style:{borderBottom:i<filtered.length-1?"0.5px solid var(--color-border-tertiary)":"none"}},
              React.createElement("div",{style:{display:"grid",gridTemplateColumns:"32px 1fr 90px 80px",gap:"0 10px",padding:"11px 14px",alignItems:"center"}},
                React.createElement("span",{style:{fontSize:12,color:"var(--color-text-secondary)",fontWeight:500}},"#"+globalNum),
                React.createElement("div",{style:{minWidth:0}},
                  React.createElement("p",{style:{fontSize:13,fontWeight:500,margin:"0 0 5px",lineHeight:1.4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",cursor:"pointer"},onClick:()=>setExpandedId(isOpen?null:q.id)},q.question),
                  React.createElement("div",{style:{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}},
                    React.createElement(Badge,{label:q.diff,c:DIFF_C[q.diff]}),
                    React.createElement("span",{style:{fontSize:11,color:"#16A34A",fontWeight:500}},"✓ "+q.options[q.correct].slice(0,35)+(q.options[q.correct].length>35?"…":""))
                  )
                ),
                React.createElement(Badge,{label:q.cat.replace(" SEO",""),c:CAT_C[q.cat]}),
                React.createElement("div",{style:{display:"flex",gap:2}},
                  React.createElement("button",{onClick:()=>setExpandedId(isOpen?null:q.id),title:"Preview",style:ib},isOpen?"▲":"▼"),
                  React.createElement("button",{onClick:()=>{setEditingQ({...q,options:[...q.options]});setView("form");},title:"Edit",style:ib},"✏️"),
                  React.createElement("button",{onClick:()=>setDeleteId(q.id),title:"Delete",style:ib},"🗑️")
                )
              ),
              isOpen&&React.createElement("div",{style:{padding:"0 14px 16px 46px"}},
                React.createElement("div",{style:{background:"var(--color-background-secondary)",borderRadius:10,padding:"14px 16px",fontSize:13}},
                  React.createElement("p",{style:{color:"var(--color-text-secondary)",marginBottom:10,lineHeight:1.6}},"📍 "+q.context),
                  React.createElement("div",{style:{marginBottom:10}},
                    q.options.map((opt,oi)=>React.createElement("div",{key:oi,style:{display:"flex",gap:8,alignItems:"flex-start",marginBottom:5}},
                      React.createElement("div",{style:{width:20,height:20,borderRadius:"50%",background:oi===q.correct?"#16A34A":"var(--color-background-tertiary)",color:oi===q.correct?"#fff":"var(--color-text-secondary)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,flexShrink:0,marginTop:1}},oi===q.correct?"✓":String.fromCharCode(65+oi)),
                      React.createElement("span",{style:{color:oi===q.correct?"#15803D":"var(--color-text-primary)",fontWeight:oi===q.correct?500:400,lineHeight:1.5}},opt)
                    ))
                  ),
                  React.createElement("div",{style:{background:"var(--color-background-primary)",borderRadius:8,padding:"10px 12px",border:"0.5px solid var(--color-border-tertiary)"}},
                    React.createElement("span",{style:{fontSize:11,fontWeight:500,color:"var(--color-text-secondary)"}},"💡 Explanation: "),
                    React.createElement("span",{style:{fontSize:12,color:"var(--color-text-secondary)",lineHeight:1.7}},q.explanation)
                  )
                )
              )
            );
          })
      ),

      deleteId&&React.createElement("div",{style:{marginTop:12,background:"var(--color-background-danger)",border:"0.5px solid var(--color-border-danger)",borderRadius:10,padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap"}},
        React.createElement("span",{style:{fontSize:14,color:"var(--color-text-danger)"}},"Delete this question? This cannot be undone."),
        React.createElement("div",{style:{display:"flex",gap:8}},
          React.createElement("button",{onClick:()=>setDeleteId(null),style:{...ib,border:"0.5px solid var(--color-border-secondary)",padding:"6px 14px"}},"Cancel"),
          React.createElement("button",{onClick:()=>deleteQ(deleteId),style:{background:"#DC2626",color:"#fff",border:"none",borderRadius:7,padding:"6px 14px",fontSize:13,fontWeight:500,cursor:"pointer",fontFamily:"var(--font-sans)"}},"Yes, delete")
        )
      )
    ),

    view==="form"&&React.createElement("div",null,
      React.createElement("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:16}},
        React.createElement("button",{onClick:()=>{setView("list");setEditingQ(null);},style:{...ib,border:"0.5px solid var(--color-border-secondary)",padding:"6px 12px"}},"← Back"),
        React.createElement("span",{style:{fontSize:15,fontWeight:500}},editingQ&&questions.find(q=>q.id===editingQ.id)?"Edit question":"Add new question")
      ),
      React.createElement(Form,{initial:editingQ,onSave:saveQ,onCancel:()=>{setView("list");setEditingQ(null);}})
    )
  );
}

ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
